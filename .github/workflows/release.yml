name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. The version-verify
    # step below enforces semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v1.1.0 == 1.1.0
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        # Pipe the upstream installer (same as ci.yml / patra). Replaces the
        # silent `curl -sLO | tar xzf` that saved a 404 page → "not in gzip
        # format" when a freshly bumped pin's tarball asset was still uploading.
        # install.sh fetches with -sSfL (fails clean), source-bootstrap fallback.
        run: |
          set -e
          CYRIUS_VERSION="$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"
          echo "CYRIUS_HOME=$HOME/.cyrius" >> "$GITHUB_ENV"

      - name: Verify toolchain
        # `cc5` was renamed to `cycc` in Cyrius 6.0; use the wrapper.
        run: cyrius --version

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/agnsh.cyr build/agnsh
          echo "agnsh: $(wc -c < build/agnsh) bytes"

      - name: Cross-build aarch64 (best-effort)
        # Cyrius 6.0 renamed cc5_aarch64 → cycc_aarch64.
        run: |
          if [ -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            CYRIUS_DCE=1 cyrius build --aarch64 src/agnsh.cyr build/agnsh-aarch64
            echo "agnsh-aarch64: $(wc -c < build/agnsh-aarch64) bytes"
          else
            echo "::warning::cycc_aarch64 not in toolchain — aarch64 binary skipped in release"
          fi

      - name: Test
        run: |
          for t in tests/test_*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            CYRIUS_DCE=1 cyrius build "$t" "/tmp/ci_$name"
            "/tmp/ci_$name"
            rm -f "/tmp/ci_$name"
          done

      - name: Smoke test
        run: sh scripts/smoke-test.sh build/agnsh

      - name: Clean toolchain artifacts
        run: rm -f cyrius-*.tar.gz

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="agnoshi-${TAG}/" -o "agnoshi-${TAG}-src.tar.gz" HEAD
          # Ship prebuilt binaries alongside source so consumers can
          # grab a statically-linked ELF per arch.
          if [ -f build/agnsh ]; then
            cp build/agnsh "agnsh-${TAG}-x86_64-linux"
          fi
          if [ -f build/agnsh-aarch64 ]; then
            cp build/agnsh-aarch64 "agnsh-${TAG}-aarch64-linux"
          fi
          sha256sum agnoshi-*.tar.gz agnsh-*-linux 2>/dev/null > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            agnoshi-*.tar.gz
            agnsh-*-linux
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog excerpt
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "agnoshi ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            agnoshi-*.tar.gz
            agnsh-*-linux
            cyrius.lock
            SHA256SUMS
