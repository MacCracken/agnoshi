name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # `cyrius deps` populates ./lib/ from the version-pinned snapshot.
  # The toolchain then notes that ./lib/ shadows its own version cache —
  # informational, not an error. Silence to keep CI logs clean.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep -oP '(?<=^cyrius = ")[^"]+' cyrius.cyml)}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Verify toolchain
        run: cc5 --version

      - name: Resolve dependencies
        # `./lib/` is gitignored — `cyrius deps` populates it from
        # the version-pinned stdlib snapshot. Must run before any
        # step that resolves `include "lib/..."` (syntax check,
        # fmt, lint, vet, capacity, build).
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # `cyrius.lock` has been generated and committed. Once the
        # lockfile lands in-tree, this step starts enforcing hashes.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Syntax check
        # agnoshi modules are stitched together through `src/agnsh.cyr`
        # (they don't declare their own includes the way agnosys's do),
        # so per-file `cyrius check` trips on cross-module references
        # (`PermissionLevel`, etc.) that are only resolvable from the
        # entry. Walk from the entry — same posture as vet / capacity /
        # build.
        run: cyrius check src/agnsh.cyr

      - name: Capacity gate
        run: cyrius capacity --check src/agnsh.cyr

      - name: Format check
        # cyrius fmt <file> emits the formatted source to stdout; diff
        # against the committed file to enforce no drift. (--check was
        # a no-op in cyrius 5.9.x so we rely on diff for the gate.)
        run: |
          fail=0
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Auto-discover so new modules are covered without editing CI.
        # Treat any warning as a failure.
        run: |
          fail=0
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Vet (include-graph audit)
        run: cyrius vet src/agnsh.cyr

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/agnsh.cyr build/agnsh
          echo "agnsh: $(wc -c < build/agnsh) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/agnsh | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        # The toolchain translates x86_64 syscall numbers to aarch64
        # at codegen. Requires cc5_aarch64 in the toolchain bin dir;
        # skip with a warning if the release didn't bundle it.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cc5_aarch64" ]; then
            echo "::warning::cc5_aarch64 not shipped with Cyrius $CYRIUS_VERSION — skipping aarch64 cross-build"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/agnsh.cyr build/agnsh-aarch64
          file build/agnsh-aarch64 | grep -q "aarch64" || {
            echo "ERROR: build/agnsh-aarch64 is not an aarch64 ELF"; exit 1; }
          echo "agnsh-aarch64: $(wc -c < build/agnsh-aarch64) bytes"

      - name: Smoke test
        run: sh scripts/smoke-test.sh build/agnsh

      - name: Coverage gate
        # Cyrius doesn't ship line-coverage instrumentation, so this is
        # fn-level: counts top-level `fn` defs across the modules linked
        # into the agnsh binary (per src/agnsh.cyr's include list) and
        # requires >=80% to be referenced by name in the test files.
        # Threshold is the v1.2.0 roadmap target.
        run: sh scripts/check-coverage.sh 80

      - name: Cstring/Str type-mismatch lint
        # Static analyzer for the Cyrius cstring/Str mismatch class
        # that bit agnoshi five times across v1.2.0/v1.3.0 (silent
        # runtime fallthroughs and aarch64-only build breaks). Greps
        # for known antipatterns: Str-typed fns without _cstr overload
        # (str_cat, str_len, str_data, str_starts_with, str_ends_with)
        # receiving cstring literals, plus raw syscalls (SYS_OPEN /
        # CHMOD / STAT) that don't exist in aarch64's generic table.
        # See scripts/lint-cstr-str.sh for the full pattern list +
        # rationale. Escape hatch: `# lint:cstr-ok` trailing comment.
        run: sh scripts/lint-cstr-str.sh

      - name: Integration tests
        run: |
          for t in tests/test_*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            CYRIUS_DCE=1 cyrius build "$t" "/tmp/ci_$name"
            "/tmp/ci_$name"
            rm -f "/tmp/ci_$name"
          done

      - name: Benchmarks
        run: |
          CYRIUS_DCE=1 cyrius build tests/bench_core.bcyr build/bench_core
          ./build/bench_core | tee bench-results.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agnsh-${{ github.sha }}
          path: |
            build/agnsh
            bench-results.txt

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Matches code lines only — rejects patterns in # comments.
        # Note: this scan is tuned for agnoshi (userland shell), not
        # for a kernel-interface library. agnoshi legitimately references
        # /bin/sudo (sudo invocation) and uses "/bin/" / "/sbin/" prefix
        # strings to *block* writes — so the agnosys-style "any /bin/
        # mention is a write" heuristic would all be false positives.
        # We scan for narrower, agnoshi-specific footguns instead.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # Raw execve(59) — every exec must go through the approval +
          # sanitize pipeline. Direct syscalls bypass it.
          scan "raw execve"     'syscall( *59'
          # Direct shadow file access — passwd reads are fine, shadow is not.
          scan "shadow access"  '"/etc/shadow"'
          # Sudo invocation outside src/security.cyr — every sudo path
          # must route through the re-verification + privilege-escalation
          # gate in security.cyr.
          stray_sudo=$(grep -rn '"/bin/sudo"\|"/usr/bin/sudo"' src/ 2>/dev/null \
            | grep -v '^src/security.cyr:' \
            | awk -F: '{ line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
          if [ -n "$stray_sudo" ]; then
            echo "FAIL: stray sudo path (must live in src/security.cyr)"
            echo "$stray_sudo"
            FAIL=1
          fi
          # Unbounded fn-scope buffers — cyrius emits `var buf[N]` inside
          # functions as STATIC DATA, not stack; consecutive calls share
          # the backing memory. 4 KB PATH_MAX buffers are the expected
          # pattern, so warn only at >= 8 KB; >= 64 KB fails the build.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": FAIL large static buffer ("n" bytes): "$0
              else if (n >= 8192) print FILENAME":"NR": warn fn-scope buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          if grep -q "^.*: FAIL " /tmp/bigbuf.txt; then FAIL=1; fi
          # Sanitize module must still exist (security-audit gate).
          test -f src/sanitize.cyr || { echo "FAIL: src/sanitize.cyr missing"; FAIL=1; }
          # Security test suite must still exist.
          test -f tests/test_security.tcyr || { echo "FAIL: tests/test_security.tcyr missing"; FAIL=1; }
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml CLAUDE.md docs/development/roadmap.md docs/doc-health.md; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify audit report present
        run: |
          test -d docs/audit && ls docs/audit/*.md > /dev/null && echo "OK: audit reports present" || { echo "MISSING: docs/audit/"; exit 1; }

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "FAIL: cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version consistent (manifest pulls VERSION via \${file:VERSION})"
