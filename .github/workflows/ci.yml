name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(cat .cyrius-toolchain 2>/dev/null | tr -d '[:space:]')}"
          CYRIUS_VERSION="${CYRIUS_VERSION:-4.3.0}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Build agnsh binary
        run: |
          mkdir -p build
          cyrius build src/agnsh.cyr build/agnsh
          echo "agnsh size: $(wc -c < build/agnsh) bytes"

      - name: Smoke test
        run: sh scripts/smoke-test.sh build/agnsh

      - name: Build benchmark suite
        run: cyrius build tests/bench_core.bcyr build/bench_core

      - name: Run benchmarks
        run: ./build/bench_core | tee bench-results.txt

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: agnsh-${{ github.sha }}
          path: |
            build/agnsh
            bench-results.txt

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          for doc in README.md CHANGELOG.md VERSION LICENSE cyrius.toml; do
            test -f "$doc" && echo "OK: $doc" || { echo "MISSING: $doc"; exit 1; }
          done

      - name: Verify version consistency
        run: |
          V_FILE=$(cat VERSION | tr -d '[:space:]')
          V_TOML=$(grep '^version' cyrius.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$V_FILE" != "$V_TOML" ]; then
            echo "Version mismatch: VERSION=$V_FILE, cyrius.toml=$V_TOML"
            exit 1
          fi
          echo "Version: $V_FILE"

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify audit report present
        run: |
          test -d docs/audit && ls docs/audit/*.md && echo "OK: audit reports present" || { echo "MISSING: docs/audit/"; exit 1; }

      - name: Check sanitize module exists
        run: |
          test -f src/sanitize.cyr && echo "OK sanitize.cyr"

      - name: Check security test suite
        run: |
          test -f tests/test_security.tcyr && echo "OK test_security.tcyr"
